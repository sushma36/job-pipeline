# =============================================================
#  GitHub Actions — Twice-Daily Data Engineer Job Pipeline
#  Run 1: 7:00 AM ET (11:00 UTC)
#  Run 2: 3:00 PM ET (19:00 UTC)
# =============================================================
#  SECRETS NEEDED (Settings → Secrets → Actions):
#    APIFY_TOKEN      → from apify.com
#    GMAIL_USER       → sushmads698@gmail.com
#    GMAIL_APP_PASS   → 16-char Gmail app password
#    NOTIFY_EMAIL     → sushmads698@gmail.com
#    LINKEDIN_COOKIE  → li_at cookie value from linkedin.com
# =============================================================

name: Twice-Daily Job Discovery Pipeline

on:
  schedule:
    - cron: "0 11 * * *"   # 7:00 AM ET
    - cron: "0 19 * * *"   # 3:00 PM ET
  workflow_dispatch:        # Manual trigger from Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "apify-client==3.0.5" openpyxl pandas python-dateutil requests lxml beautifulsoup4

      - name: Set run slot label
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -eq 11 ]; then
            echo "RUN_SLOT=🌅 Morning Run (7AM ET)" >> $GITHUB_ENV
          else
            echo "RUN_SLOT=🌇 Afternoon Run (3PM ET)" >> $GITHUB_ENV
          fi

      - name: Run job discovery pipeline
        env:
          APIFY_TOKEN:      ${{ secrets.APIFY_TOKEN }}
          GMAIL_USER:       ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:   ${{ secrets.GMAIL_APP_PASS }}
          NOTIFY_EMAIL:     ${{ secrets.NOTIFY_EMAIL }}
          LINKEDIN_COOKIE:  ${{ secrets.LINKEDIN_COOKIE }}
          RUN_SLOT:         ${{ env.RUN_SLOT }}
        run: python run_pipeline.py

      - name: Upload Excel results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "jobs-run${{ github.run_number }}"
          path: data_engineer_jobs_*.xlsx
          retention-days: 30
